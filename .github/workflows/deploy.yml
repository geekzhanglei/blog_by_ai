# ============================================================
# GitHub Actions CI/CD 配置 (参考 beta_mysql/ci.yml 模式)
# 策略：不用 scp 上传产物，改为在服务器上 git pull + 本地构建 + pm2 重启
# 优势：彻底避开 scp-action 的 handshake EOF 问题，只用 1 次 SSH 会话
# ============================================================

name: Node.js CI

# 触发条件：main 分支的 push 或 pull_request
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 强制 GitHub Actions 自身的 JS actions 在 Node.js 24 下运行
# （解决 "Node.js 20 actions are deprecated" 警告）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================================
  # 任务 A: 构建校验 (只验证代码能正常安装依赖并构建通过)
  # ==========================================================
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      # 3. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # 4. 安装依赖 (--frozen-lockfile 确保版本锁定)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. 构建验证 (确保代码可构建，不上传产物)
      - name: Build Astro project
        run: pnpm build

  # ==========================================================
  # 任务 B: 部署到服务器 (CD 持续部署)
  # ==========================================================
  deploy:
    name: Deploy to Server
    # 依赖关系：build 通过后才部署
    needs: build
    # 限制：只有 main 分支 push 时才部署 (PR 只跑 build 不部署)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:
      # SSH 登录服务器执行部署 (单次 SSH 会话，最稳)
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. 进入服务器上的项目目录
            cd /www/frontEnd/blog_by_ai

            # 2. 从 GitHub 拉取最新代码
            git pull origin main

            # 3. 加载 NVM 环境 (ssh-action 是非交互式 shell，需手动 source)
            export NVM_DIR="/root/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # 4. 安装依赖 + 构建 + 重启 pm2
            pnpm install --frozen-lockfile
            pnpm build
            pnpm pm2:reload || pnpm pm2:start
            pm2 save
