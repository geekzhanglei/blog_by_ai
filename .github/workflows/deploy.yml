# ============================================================
# GitHub Actions CI/CD 配置
# 触发条件：main 分支的 push 或 pull_request
# 功能：pnpm 构建 -> 上传到服务器 -> pm2 重启
# ============================================================

name: Deploy to Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 禁用并发，防止多个部署同时运行
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # 仅当 push 到 main 时才执行部署（PR 只构建不部署）
    if: github.event_name == 'push' || github.event.pull_request.merged == true

    steps:
      # ---------- 1. 检出代码 ----------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------- 2. 安装 pnpm ----------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      # ---------- 3. 安装 Node.js ----------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # ---------- 4. 安装依赖 ----------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---------- 5. 构建项目 ----------
      - name: Build Astro project
        run: pnpm build

      # ---------- 6. 打包构建产物 ----------
      - name: Package dist
        run: |
          tar -czf deploy.tar.gz \
            dist/ \
            package.json \
            pnpm-lock.yaml \
            ecosystem.config.cjs

      # ---------- 7. 上传构建产物到服务器 ----------
      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: deploy.tar.gz
          target: /opt/blog-by-ai/

      # ---------- 8. 在服务器上解压并重启 ----------
      - name: Deploy & restart on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: true
          script: |
            cd /opt/blog-by-ai
            # 备份旧版本（保留最近5个）
            mkdir -p backups
            [ -d dist ] && tar -czf backups/dist-$(date +%Y%m%d-%H%M%S).tar.gz dist/ 2>/dev/null || true
            ls -t backups/ | tail -n +6 | xargs -r rm -f

            # 解压新版本
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            # 安装生产依赖（精简安装，不装 devDependencies）
            pnpm install --prod --frozen-lockfile

            # 用 pm2 启动或重启（零停机 reload）
            pm2 reload ecosystem.config.cjs --env production || pm2 start ecosystem.config.cjs --env production

            # 保存 pm2 进程列表（服务器重启后自动恢复）
            pm2 save

            echo "✅ 部署完成，端口 4321"
